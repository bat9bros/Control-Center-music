<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      font-family: Arial;
    }

    img {
      width: 120px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <img src="icon.ico">
</body>
</html>
